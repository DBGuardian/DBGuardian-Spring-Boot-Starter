spring:
  application:
    name: dbguardian-test

  datasource:
    url: jdbc:h2:mem:dbguardian_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  redis:
    host: localhost
    port: 6379
    database: 1
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: 1000ms
        max-idle: 2
        min-idle: 1

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.dbguardian.test.entity

dbguardian:
  enabled: true
  cluster-id: test-cluster
  nodes:
    - id: master-1
      role: master
      database-type: h2
      jdbc-url: jdbc:h2:mem:dbguardian_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      username: sa
      password:
      weight: 100
      priority: 100
      enabled: true
      tags:
        - primary
    - id: slave-1
      role: slave
      database-type: h2
      jdbc-url: jdbc:h2:mem:dbguardian_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      username: sa
      password:
      master-ref: master-1
      weight: 100
      priority: 90
      enabled: true
      tags:
        - readonly

logging:
  level:
    root: INFO
    com.dbguardian.test: DEBUG
    io.dbguardian: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"