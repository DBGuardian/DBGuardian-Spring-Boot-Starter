spring:
  application:
    name: business-workflow-erp

  # MVC配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
    property-naming-strategy: LOWER_CAMEL_CASE

  # 主库数据源配置
  datasource:
    master:
      url: jdbc:mysql://106.55.104.229:3306/business-workflow-erp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: Ry260104.Ry260104.
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    # 从库数据源配置
    slave:
      url: jdbc:mysql://42.194.239.94:3306/business-workflow-erp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: Ry260104.Ry260104.
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    # 主从复制配置
    replication:
      master-host: 106.55.104.229
      master-port: 3306
      master-user: repl
      master-password: Ry260104.Ry260104.
      auto-reconnect: true
    # 降级启动配置
    allow-degraded-startup: true  # 开发环境允许数据库不可用时降级启动

  # Redis配置
  redis:
    host: 106.55.104.229
    port: 6379
    password: Ry260104.Ry260104.
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 50
        max-wait: 3000ms
        max-idle: 20
        min-idle: 5

  rabbitmq:
    host: 42.194.239.94
    port: 5672
    username: admin
    password: Ry260104.Ry260104.
    virtual-host: /
    connection-timeout: 15000
